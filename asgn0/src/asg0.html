<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Assignment 0</title>
  </head>

  <body onload="main()">
    <p>Hunter Pettus | hrpettus@ucsc.edu</p>
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>

    <div>
      <p>Vector 1:</p>
      <label>x: <input type="text" id="v1x" value="2.25"></label>
      <label>y: <input type="text" id="v1y" value="2.25"></label>
    </div>

    <div>
      <p>Vector 2:</p>
      <label>x: <input type="text" id="v2x" value="1.0"></label>
      <label>y: <input type="text" id="v2y" value="1.0"></label>
    </div>

    <div>
      <input type="button" value="Draw" onclick="handleDrawEvent()">
    </div>

    <div>
      <p>Operations:</p>
      <select id="operation">
        <option value="add">Add</option>
        <option value="sub">Subtract</option>
        <option value="mul">Multiply</option>
        <option value="div">Divide</option>
        <option value="magnitude">Magnitude</option>
        <option value="normalize">Normalize</option>
        <option value="angleB">Angle between</option>
        <option value="area">Area</option>
      </select>
      <label>Scalar: <input type="text" id="scalar" value="2"></label>
      <input type="button" value="Draw Operation" onclick="handleDrawOperationEvent()">
    </div>

    <script src="../lib/cuon-matrix-cse160.js"></script>
    <script src="asg0.js"></script>
  </body>
</html>
